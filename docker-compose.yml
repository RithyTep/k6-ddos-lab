version: "3.8"

services:
  # ---- TARGET: nginx web server (weak on purpose) ----
  target:
    build: ./target
    container_name: ddos-target
    ports:
      - "8080:80"
    networks:
      - lab-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ---- PROXY: squid forward proxy ----
  proxy:
    build: ./proxy
    container_name: ddos-proxy
    ports:
      - "3128:3128"
    networks:
      - lab-net
    depends_on:
      - target

  # ---- MONITOR: real-time hacker dashboard ----
  monitor:
    build: ./monitor
    container_name: ddos-monitor
    ports:
      - "4000:4000"
    environment:
      - TARGET_HOST=target
      - TARGET_PORT=80
    networks:
      - lab-net
    depends_on:
      - target

  # ---- ATTACKER: k6 load testing ----
  k6:
    image: grafana/k6:latest
    container_name: ddos-k6
    volumes:
      - ./scripts:/scripts
    networks:
      - lab-net
    depends_on:
      - target
      - proxy
    entrypoint: ["k6"]
    command: ["run", "/scripts/http_flood.js"]
    profiles:
      - attack

networks:
  lab-net:
    driver: bridge
